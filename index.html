<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

</head>

<body style="margin:0; font-family:sans-serif; text-align:center; background:#f2f2f2;">

<h1>Nazar PV Cafe ☕</h1>
<p>Scan & See Coffee in AR</p>

<model-viewer
src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/CoffeeCup/glTF-Binary/CoffeeCup.glb"
ar
ar-modes="scene-viewer webxr quick-look"
camera-controls
auto-rotate
shadow-intensity="1"
style="width:100%; height:80vh; background:white;">
</model-viewer>

</body>
</html>
