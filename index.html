<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

</head>

<body style="margin:0; text-align:center; font-family:sans-serif;">

<h1>Nazar PV Cafe</h1>
<p>Select item to see in AR</p>

<button onclick="coffee()">Coffee</button>
<button onclick="burger()">Burger</button>
<button onclick="pizza()">Pizza</button>

<model-viewer
id="viewer"
src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
ar
camera-controls
auto-rotate
style="width:100%; height:80vh;">
</model-viewer>

<script>

function coffee(){
document.getElementById("viewer").src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/main/2.0/CoffeeCup/glTF-Binary/CoffeeCup.glb";
}

function burger(){
document.getElementById("viewer").src="https://modelviewer.dev/shared-assets/models/Hamburger.glb";
}

function pizza(){
document.getElementById("viewer").src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb";
}

</script>

</body>
</html>
