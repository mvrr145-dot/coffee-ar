<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script type="module"
src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
</script>

<style>

body{
background:black;
color:white;
font-family:sans-serif;
text-align:center;
margin:0;
}

h1{
font-size:40px;
letter-spacing:4px;
}

button{
padding:12px 25px;
margin:10px;
border:none;
border-radius:25px;
background:#00f0ff;
color:black;
font-weight:bold;
}

</style>

</head>

<body>

<h1>EYEAI.CO</h1>
<p>Future AR Models</p>

<button onclick="model1()">NEON BOT</button>
<button onclick="model2()">META DRONE</button>
<button onclick="model3()">CYBER UNIT</button>
<button onclick="model4()">AI CORE</button>

<model-viewer
id="viewer"
src="https://modelviewer.dev/shared-assets/models/Astronaut.glb"
ar
camera-controls
auto-rotate
style="width:100%; height:70vh;">
</model-viewer>

<script>

function model1(){
document.getElementById("viewer").src="https://modelviewer.dev/shared-assets/models/Astronaut.glb";
}

function model2(){
document.getElementById("viewer").src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb";
}

function model3(){
document.getElementById("viewer").src="https://modelviewer.dev/shared-assets/models/NeilArmstrong.glb";
}

function model4(){
document.getElementById("viewer").src="https://modelviewer.dev/shared-assets/models/RobotExpressive.glb";
}

</script>

</body>
</html>
function model5(){

}

function model6(){
